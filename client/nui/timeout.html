<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Speedway Notice</title>
  <style>
    html, body { margin:0; padding:0; height:100%; font-family: Arial, sans-serif; }
    .overlay { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.65); }
    .card { width: 420px; max-width: 90vw; background: #111827; color: #fff; border: 1px solid #374151; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
    .header { padding: 14px 16px; border-bottom: 1px solid #374151; font-weight: 600; display:flex; align-items:center; gap:8px; }
    .body { padding: 16px; line-height: 1.5; color: #e5e7eb; }
    .actions { padding: 12px 16px; border-top: 1px solid #374151; display: flex; justify-content: flex-end; gap: 8px; }
    button { background: #2563eb; color: #fff; border: none; border-radius: 6px; padding: 10px 14px; font-weight: 600; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    .titleIcon { font-size: 18px; }

    /* Lobby tablet styles */
    :root {
      --bg: #0f121a;
      --panel-bg1: #1b2030;
      --panel-bg2: #161b28;
      --border: rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.14);
      --glow: rgba(0, 170, 255, 0.25);
      --text: #e9eef7;
      --muted: #9aa6bd;
      --host: #ffd700;
    }
  /* Lobby overlay: left-center and non-interactive (no focus capture) */
  .lobbyOverlay { position: fixed; inset:0; display:none; align-items:center; justify-content:flex-start; background: none; pointer-events: none; }
    .tablet {
      width: 420px; max-width: 46vw; margin-left: 2.2vw;
      background: linear-gradient(180deg, var(--panel-bg1), var(--panel-bg2));
      border-radius: 18px; border: 1px solid var(--border);
      box-shadow: 0 10px 32px rgba(0,0,0,0.45), 0 0 0 1px var(--border), inset 0 0 64px var(--glow);
      color: var(--text); overflow:hidden;
      /* requested: semi-transparency + 50% scale */
      opacity: 0.65;
      transform: scale(0.8);
      transform-origin: left center;
    }
    /* Interact mode toggled from client (enables pointer input briefly) */
    .lobbyOverlay.interact { pointer-events: auto; }
    .tablet.interact { opacity: 0.92; box-shadow: 0 0 0 2px var(--glow), 0 10px 32px rgba(0,0,0,0.55); }
    .tablet__bezel { padding: 18px 18px 12px 18px; border-bottom: 1px solid var(--border); background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(0,0,0,0.08)); }
    .tablet__notch { width: 96px; height: 8px; border-radius: 8px; background: rgba(255,255,255,0.08); margin: 0 auto 8px auto; }
    .tablet__title { text-align:center; font-weight:600; letter-spacing:.3px; }
    .tablet__body { padding: 14px 18px 18px 18px; }
    .lobbyTable { width:100%; border-collapse:collapse; margin: 6px 0 14px 0; }
    .lobbyTable thead th { text-align:left; font-size:13px; font-weight:600; letter-spacing:.2px; color: var(--muted); padding: 8px 10px; border-bottom: 1px solid var(--border-strong); }
    .lobbyTable tbody td { padding:10px; border-bottom:1px solid var(--border); }
    .host { color: var(--host); font-weight:700; }
    .waiting { text-align:center; color: var(--muted); font-size:14px; padding:12px; }
  .lobbyActions { display:flex; gap:8px; justify-content:flex-end; margin-top: 8px; }
  .btn { background:#2563eb; color:#fff; border:none; border-radius:8px; padding:10px 12px; font-weight:700; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,0.25); }
  .btn:hover { background:#1d4ed8; }
  .btn-secondary { background:#374151; }
  .btn-secondary:hover { background:#2b303b; }
  .hint { font-size:12px; color: var(--muted); text-align:right; margin-top: 6px; }

  /* ── Race Results Overlay ── */
  #results-container {
    position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.75); z-index: 9999;
  }
  .results-card {
    width: 680px; max-width: 85vw; max-height: 85vh; overflow-y: auto;
    background: linear-gradient(180deg, var(--panel-bg1), var(--panel-bg2));
    border-radius: 18px; border: 1px solid var(--border);
    box-shadow: 0 10px 40px rgba(0,0,0,0.6), 0 0 0 1px var(--border), inset 0 0 80px var(--glow);
    color: var(--text);
  }
  .results-header {
    text-align: center; padding: 18px 20px 8px; font-size: 22px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    background: linear-gradient(180deg, rgba(255,255,255,0.04), transparent);
    border-bottom: 1px solid var(--border);
  }
  .results-track {
    text-align: center; padding: 4px 0 12px; font-size: 13px; color: var(--muted);
    letter-spacing: 0.5px;
  }
  .results-table { width: 100%; border-collapse: collapse; }
  .results-table thead th {
    text-align: left; font-size: 12px; font-weight: 600; letter-spacing: 0.3px;
    color: var(--muted); padding: 8px 12px; border-bottom: 1px solid var(--border-strong);
    text-transform: uppercase;
  }
  .results-table tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
  .results-table tbody tr:hover { background: rgba(255,255,255,0.03); }
  .results-table tbody td { padding: 10px 12px; font-size: 14px; vertical-align: middle; }
  .results-table tbody td:first-child { font-weight: 700; font-size: 16px; width: 48px; text-align: center; }

  /* Podium accents */
  .results-table tbody tr.pos-1 { border-left: 3px solid #ffd700; }
  .results-table tbody tr.pos-1 td:first-child { color: #ffd700; }
  .results-table tbody tr.pos-2 { border-left: 3px solid #c0c0c0; }
  .results-table tbody tr.pos-2 td:first-child { color: #c0c0c0; }
  .results-table tbody tr.pos-3 { border-left: 3px solid #cd7f32; }
  .results-table tbody tr.pos-3 td:first-child { color: #cd7f32; }

  .badge { display: inline-block; font-size: 11px; padding: 2px 7px; border-radius: 4px; margin-left: 6px; font-weight: 600; vertical-align: middle; }
  .badge-bestlap { background: rgba(255,215,0,0.15); color: #ffd700; }
  .badge-improved { background: rgba(0,200,83,0.15); color: #00c853; }

  .results-footer {
    padding: 12px 20px; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .results-footer .dismiss-hint { font-size: 12px; color: var(--muted); }
  .results-footer .btn-close {
    background: #2563eb; color: #fff; border: none; border-radius: 8px;
    padding: 10px 20px; font-weight: 700; cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }
  .results-footer .btn-close:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="overlay" id="overlay">
    <div class="card">
      <div class="header"><span class="titleIcon">🏁</span> Speedway</div>
      <div class="body" id="msg">You were removed. Please click Dismiss to continue.</div>
      <div class="actions">
        <button id="dismiss">Dismiss</button>
      </div>
    </div>
  </div>
  <!-- Lobby Overlay (tablet-style) -->
  <div class="lobbyOverlay" id="lobbyOverlay">
    <div class="tablet">
      <div class="tablet__bezel">
        <div class="tablet__notch"></div>
        <h2 id="lobbyTitle" class="tablet__title">Lobby</h2>
      </div>
      <div class="tablet__body">
        <table class="lobbyTable">
          <thead><tr><th>Player</th></tr></thead>
          <tbody id="lobbyMembers"><tr><td class="waiting">Waiting for players...</td></tr></tbody>
        </table>
        <div class="lobbyActions">
          <button id="btnLeave" class="btn btn-secondary">Leave Lobby</button>
          <button id="btnStart" class="btn">Start Race</button>
        </div>
  <div class="hint" id="hint">Press F2 to interact with the lobby.</div>
      </div>
    </div>
  </div>
  <!-- Race Results Overlay -->
  <div id="results-container">
    <div class="results-card">
      <div class="results-header">Race Results</div>
      <div class="results-track" id="results-track"></div>
      <table class="results-table">
        <thead>
          <tr>
            <th>Pos</th>
            <th>Driver</th>
            <th>Total Time</th>
            <th>Best Lap</th>
            <th>Payout</th>
          </tr>
        </thead>
        <tbody id="results-body"></tbody>
      </table>
      <div class="results-footer">
        <span class="dismiss-hint">Press ESC or click Close</span>
        <button class="btn-close" id="results-close">Close</button>
      </div>
    </div>
  </div>
  <script>
    const overlay = document.getElementById('overlay');
    const msg = document.getElementById('msg');
    const dismiss = document.getElementById('dismiss');
  const resource = (window.GetParentResourceName && GetParentResourceName()) || 'rox_speedway';
    // i18n labels (fallbacks)
    let I18N = {
      speedwayTitle: 'Speedway',
      lobby: 'Lobby',
      playerHeader: 'Player',
      waiting: 'Waiting for players...',
      leave: 'Leave Lobby',
      start: 'Start Race',
      hostTag: '(Host)',
      hintTemplate: 'Press {1} to interact with the lobby.',
      modalRemoved: 'You were removed. Please click Dismiss to continue.',
      modalDismiss: 'Dismiss',
    };

    // Lobby elements
  const lobbyOverlay = document.getElementById('lobbyOverlay');
  const lobbyTitle = document.getElementById('lobbyTitle');
  const lobbyMembers = document.getElementById('lobbyMembers');
  const btnStart = document.getElementById('btnStart');
  const btnLeave = document.getElementById('btnLeave');
  const hint = document.getElementById('hint');
  let lobbyState = { hostName: null, lobbyName: null };

    function fmtHint(tpl, key) {
      if (!tpl) return `Press ${key} to interact with the lobby.`;
      if (tpl.indexOf('{1}') !== -1) return tpl.replace('{1}', key);
      if (tpl.indexOf('{KEY}') !== -1) return tpl.replace('{KEY}', key);
      if (tpl.indexOf('%s') !== -1) return tpl.replace('%s', key);
      return tpl;
    }

    window.addEventListener('message', (e) => {
      const data = e.data || {};
      if (data.action === 'i18n' && data.i18n) {
        I18N = { ...I18N, ...data.i18n };
        // apply static labels on modal
        const hdr = document.querySelector('.card .header');
        if (hdr) {
          hdr.textContent = '';
          const icon = document.createElement('span');
          icon.className = 'titleIcon';
          icon.textContent = '\u{1F3C1}';
          hdr.appendChild(icon);
          hdr.appendChild(document.createTextNode(' ' + (I18N.speedwayTitle || 'Speedway')));
        }
        dismiss.textContent = I18N.modalDismiss || 'Dismiss';
      } else if (data.action === 'showTimeoutModal') {
        msg.textContent = data.message || I18N.modalRemoved || 'You were removed.';
        overlay.style.display = 'flex';
      } else if (data.action === 'hideTimeoutModal') {
        overlay.style.display = 'none';
      } else if (data.action === 'showLobby') {
        lobbyTitle.textContent = data.lobbyName || (I18N.lobby || 'Lobby');
        const members = Array.isArray(data.members) ? data.members : [];
        lobbyState.hostName = data.hostName || null;
        lobbyState.lobbyName = data.lobbyName || null;
        lobbyMembers.innerHTML = '';
        if (!members.length) {
          const tr = document.createElement('tr');
          const td = document.createElement('td');
          td.className = 'waiting';
          td.textContent = I18N.waiting || 'Waiting for players...';
          tr.appendChild(td);
          lobbyMembers.appendChild(tr);
        } else {
          members.forEach((m, idx) => {
            const tr = document.createElement('tr');
            const td = document.createElement('td');
            const isHost = data.hostName ? (m === data.hostName) : (idx === 0);
            if (isHost) td.className = 'host';
            const hostTag = isHost ? ` ${I18N.hostTag || '(Host)'}` : '';
            td.textContent = m + hostTag;
            tr.appendChild(td);
            lobbyMembers.appendChild(tr);
          });
        }
        // Only host sees Start button (client provides meIsHost flag)
        const meIsHost = data.meIsHost === true || false;
        btnStart.style.display = meIsHost ? 'inline-flex' : 'none';
        // Update dynamic labels
        const th = document.querySelector('.lobbyTable thead th');
        if (th) th.textContent = I18N.playerHeader || 'Player';
        btnStart.textContent = I18N.start || 'Start Race';
        btnLeave.textContent = I18N.leave || 'Leave Lobby';
        lobbyOverlay.style.display = 'flex';
      } else if (data.action === 'lobbyFocus') {
        const on = !!data.on;
        lobbyOverlay.classList.toggle('interact', on);
        const tab = document.querySelector('.tablet');
        if (tab) tab.classList.toggle('interact', on);
        hint.style.display = on ? 'none' : 'block';
      } else if (data.action === 'hideLobby') {
        lobbyOverlay.style.display = 'none';
      } else if (data.action === 'showRaceResults') {
        populateResults(data);
        document.getElementById('results-container').style.display = 'flex';
        if (data.autoDismissMs > 0) {
          resultsDismissTimer = setTimeout(function() { closeResults(); }, data.autoDismissMs);
        }
      }
    });

    // Signal to client Lua that NUI is ready
    window.addEventListener('DOMContentLoaded', () => {
      try {
        fetch(`https://${resource}/nuiReady`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({})
        });
      } catch (e) {
        // ignore
      }
    });

    dismiss.addEventListener('click', () => {
      fetch(`https://${resource}/timeoutDismiss`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({})
      }).catch(() => {});
    });

    // ── Race Results helpers ──
    let resultsDismissTimer = null;

    function formatRaceTime(ms) {
      if (!ms || ms <= 0) return '--:--.--';
      var totalSec = ms / 1000;
      var mins = Math.floor(totalSec / 60);
      var secs = totalSec - (mins * 60);
      // Show one decimal place
      var secStr = secs < 10 ? '0' + secs.toFixed(1) : secs.toFixed(1);
      return mins + ':' + secStr;
    }

    function formatPayout(amount) {
      if (!amount || amount <= 0) return '--';
      return '$' + amount.toLocaleString();
    }

    function populateResults(data) {
      var results = data.results || [];
      var trackEl = document.getElementById('results-track');
      var tbody = document.getElementById('results-body');

      trackEl.textContent = data.track ? data.track.replace(/_/g, ' ') : '';
      tbody.innerHTML = '';

      results.forEach(function(entry) {
        var tr = document.createElement('tr');
        if (entry.position <= 3) tr.className = 'pos-' + entry.position;

        // Position
        var tdPos = document.createElement('td');
        var posLabel = entry.position === 1 ? '1st' : entry.position === 2 ? '2nd' : entry.position === 3 ? '3rd' : entry.position + 'th';
        tdPos.textContent = posLabel;
        tr.appendChild(tdPos);

        // Driver name + badges
        var tdName = document.createElement('td');
        tdName.textContent = entry.name || ('Player ' + entry.id);
        if (entry.isBestLap) {
          var badge = document.createElement('span');
          badge.className = 'badge badge-bestlap';
          badge.textContent = '\u2605 Best Lap';
          tdName.appendChild(badge);
        }
        if (entry.isMostImproved) {
          var badge2 = document.createElement('span');
          badge2.className = 'badge badge-improved';
          badge2.textContent = '\u2191 Most Improved';
          tdName.appendChild(badge2);
        }
        tr.appendChild(tdName);

        // Total time
        var tdTime = document.createElement('td');
        tdTime.textContent = formatRaceTime(entry.time);
        tr.appendChild(tdTime);

        // Best lap
        var tdBest = document.createElement('td');
        tdBest.textContent = formatRaceTime(entry.bestLap);
        tr.appendChild(tdBest);

        // Payout
        var tdPay = document.createElement('td');
        tdPay.textContent = formatPayout(entry.payout);
        tr.appendChild(tdPay);

        tbody.appendChild(tr);
      });
    }

    function closeResults() {
      document.getElementById('results-container').style.display = 'none';
      if (resultsDismissTimer) { clearTimeout(resultsDismissTimer); resultsDismissTimer = null; }
      fetch('https://' + resource + '/resultsClose', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({}) }).catch(function(){});
    }

    document.getElementById('results-close').addEventListener('click', function() { closeResults(); });

    // Allow ESC to dismiss results or exit lobby interact mode
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        // If results are showing, dismiss them
        if (document.getElementById('results-container').style.display !== 'none'
            && document.getElementById('results-container').style.display !== '') {
          closeResults();
          return;
        }
        // Otherwise, exit lobby interact mode
        fetch(`https://${resource}/lobbyCancel`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({}) }).catch(()=>{});
      }
    });

    // Update hint text on showLobby using provided key label
    window.addEventListener('message', (e) => {
      const data = e.data || {};
      if (data.action === 'showLobby') {
        const label = (data.keyLabel && String(data.keyLabel)) || 'F2';
        hint.textContent = fmtHint(I18N.hintTemplate, label);
      }
    });

    // Button clicks
    btnStart.addEventListener('click', () => {
      fetch(`https://${resource}/lobbyStart`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ lobbyName: lobbyState.lobbyName }) }).catch(()=>{});
    });
    btnLeave.addEventListener('click', () => {
      fetch(`https://${resource}/lobbyLeave`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({}) }).catch(()=>{});
    });
  </script>
</body>
</html>
